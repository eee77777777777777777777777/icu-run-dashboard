<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>俱乐部 - ICU 跑步看板</title>
  <link rel="stylesheet" href="/css/design.css" />
  <script src="/js/chart.umd.min.js" defer></script>
</head>
<body>
<main class="app">
  <header class="topbar">
    <a class="brand" href="/" style="text-decoration:none">
      <strong>跑步俱乐部</strong>
      <span id="club-name">活动日历</span>
    </a>
    <nav class="nav-links">
      <a class="nav-link" href="/">首页</a>
      <a class="nav-link" href="/health.html">健康报告</a>
      <a class="nav-link active" href="/club.html">俱乐部</a>
      <a class="nav-link" href="/training_plan.html">AI 训练</a>
    </nav>
  </header>

  <div class="status-bar">
    <span class="pulse"></span>
    <span id="status">正在加载俱乐部数据</span>
    <span style="margin-left:auto;font-size:11px;color:var(--text-muted)" id="report-period"></span>
  </div>
  <div class="error" id="error"></div>
  <div class="loading" id="loading">正在连接数据源...</div>

  <!-- Summary Stats -->
  <div class="status-grid" id="club-stats"></div>

  <!-- Distance Ranking -->
  <div class="section" style="margin-top:16px">
    <div class="section-head">
      <div class="section-title">今日距离排名</div>
      <div class="section-note" id="rank-note"></div>
    </div>
    <div class="chart-panel">
      <canvas id="distanceChart" height="300"></canvas>
    </div>
  </div>

  <!-- Device + Elevation -->
  <div class="section">
    <div class="chart-grid">
      <div class="chart-panel">
        <div class="section-title" style="margin-bottom:8px">设备分布</div>
        <canvas id="deviceChart" height="220"></canvas>
      </div>
      <div class="chart-panel">
        <div class="section-title" style="margin-bottom:8px">累计爬升排行</div>
        <canvas id="elevationChart" height="220"></canvas>
      </div>
    </div>
  </div>

  <!-- Ranking Table -->
  <div class="section">
    <div class="section-head">
      <div class="section-title">成员排名</div>
      <div class="section-note">按距离排序</div>
    </div>
    <div class="list" id="ranking-table"></div>
  </div>

  <!-- Coach Commentary -->
  <div class="section">
    <div class="section-head">
      <div class="section-title">教练点评</div>
      <div class="section-note">AI 自动分析</div>
    </div>
    <div class="note" id="coach-commentary">暂无点评数据</div>
  </div>
</main>

<script>
const fmt  = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 1 });
const fmt0 = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 });
const $ = (id) => document.getElementById(id);

async function loadClub() {
  try {
    $("error").style.display = "none";
    $("status").textContent = "正在加载...";
    const resp = await fetch("/api/club", { cache: "no-store" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    renderClub(data);
  } catch (err) {
    // Fallback: try /club_today.json (snapshot diff format)
    try {
      $("status").textContent = "尝试快照差分数据...";
      const resp2 = await fetch("/club_today.json?_=" + Date.now(), { cache: "no-store" });
      if (!resp2.ok) throw new Error("club_today.json not available");
      const data2 = await resp2.json();
      if (data2.error) throw new Error(data2.error);
      renderClub({ activities: data2.activities && data2.activities.length > 0 ? data2.activities : data2.all_activities, period: data2.period, commentary: data2.commentary, report_date: data2.report_date, updated: data2.updated });
    } catch (err2) {
      $("loading").style.display = "none";
      $("status").textContent = "加载失败";
      $("error").textContent = "俱乐部数据不可用: " + err.message;
      $("error").style.display = "block";
    }
  }
}

function renderClub(data) {
  $("loading").style.display = "none";
  $("status").textContent = `更新于 ${data.updated || data.report_date || "--"}`;
  $("report-period").textContent = data.period || "";
  $("club-name").textContent = data.club_name || "跑步俱乐部";

  const acts = data.activities || [];
  if (!acts.length) {
    $("club-stats").innerHTML = '<div class="note" style="grid-column:1/-1">暂无活动数据 — 等待 Strava 快照差分结果</div>';
    return;
  }

  // Stats
  const totalDist = acts.reduce((s, a) => s + (a.distance_km || 0), 0);
  const totalTime = acts.reduce((s, a) => s + (a.moving_min || 0), 0);
  const members = new Set(acts.map(a => a.name)).size;
  const totalElev = acts.reduce((s, a) => s + (a.elevation_gain || 0), 0);

  $("club-stats").innerHTML = `
    <div class="status-card card-accent-orange">
      <div class="card-label">活动数</div><div class="card-value">${acts.length}</div><div class="card-sub">次</div>
    </div>
    <div class="status-card card-accent-blue">
      <div class="card-label">活跃人数</div><div class="card-value">${members}</div><div class="card-sub">人</div>
    </div>
    <div class="status-card card-accent-green">
      <div class="card-label">总距离</div><div class="card-value">${fmt.format(totalDist)}</div><div class="card-sub">km</div>
    </div>
    <div class="status-card card-accent-purple">
      <div class="card-label">总时长</div><div class="card-value">${fmt0.format(totalTime)}</div><div class="card-sub">min (${fmt.format(totalTime / 60)} h)</div>
    </div>
    <div class="status-card card-accent-cyan">
      <div class="card-label">总爬升</div><div class="card-value">${fmt0.format(totalElev)}</div><div class="card-sub">m</div>
    </div>
    <div class="status-card card-accent-orange">
      <div class="card-label">人均距离</div><div class="card-value">${fmt.format(totalDist / members)}</div><div class="card-sub">km</div>
    </div>
  `;

  $("rank-note").textContent = `${acts.length} 条活动 · ${data.period || ""}`;

  drawDistanceChart(acts);
  drawDeviceChart(acts);
  drawElevationChart(acts);
  renderRankingTable(acts);

  if (data.commentary) {
    $("coach-commentary").innerHTML = data.commentary;
  } else {
    generateCommentary(acts);
  }
}

function generateCommentary(acts) {
  const members = [...new Set(acts.map(a => a.name))];
  const topMember = members[0] || "--";
  const runActs = acts.filter(a => a.type === "Run");
  const totalDist = runActs.reduce((s, a) => s + (a.distance_km || 0), 0);
  const avgDist = members.length > 0 ? totalDist / members.length : 0;
  $("coach-commentary").innerHTML = `本次活动共 ${members.length} 人参与，${runActs.length} 条跑步记录，人均距离 ${fmt.format(avgDist)} km。${members.length > 3 ? '大家都很活跃，继续保持节奏！' : '期待更多伙伴加入。'}`;
}

function drawDistanceChart(acts) {
  const byPerson = {};
  acts.forEach(a => {
    if (!byPerson[a.name]) byPerson[a.name] = 0;
    byPerson[a.name] += a.distance_km || 0;
  });
  const sorted = Object.entries(byPerson).sort((a, b) => b[1] - a[1]);
  if (!sorted.length) return;

  new Chart($("distanceChart").getContext("2d"), {
    type: "bar",
    data: {
      labels: sorted.map(e => e[0]),
      datasets: [{
        label: "距离 (km)",
        data: sorted.map(e => e[1]),
        backgroundColor: sorted.map((_, i) => {
          const colors = ["rgba(249,115,22,0.7)", "rgba(59,130,246,0.7)", "rgba(139,92,246,0.7)", "rgba(8,145,178,0.7)", "rgba(22,163,74,0.7)"];
          return colors[i % colors.length];
        }),
        borderRadius: 6, borderWidth: 0,
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } },
        y: { grid: { display: false }, ticks: { color: "#475569", font: { size: 12 } } }
      }
    }
  });
}

function drawDeviceChart(acts) {
  // Per-member device stats (not per-activity)
  const memberDevices = {};
  acts.forEach(a => {
    if (!memberDevices[a.name] && a.device) memberDevices[a.name] = a.device;
  });
  const deviceCount = {};
  Object.values(memberDevices).forEach(d => {
    deviceCount[d] = (deviceCount[d] || 0) + 1;
  });
  const sorted = Object.entries(deviceCount).sort((a, b) => b[1] - a[1]);

  if (!sorted.length) {
    $("deviceChart").parentElement.innerHTML = '<div class="section-title" style="margin-bottom:8px">设备分布</div><div class="note">暂无设备数据 — 成员按人统计，非同设备多次计数</div>';
    return;
  }

  new Chart($("deviceChart").getContext("2d"), {
    type: "doughnut",
    data: {
      labels: sorted.map(e => e[0]),
      datasets: [{
        data: sorted.map(e => e[1]),
        backgroundColor: ["#f97316", "#3b82f6", "#8b5cf6", "#0891b2", "#16a34a", "#ca8a04", "#ef4444", "#ec4899", "#6366f1"],
        borderWidth: 2, borderColor: "#fff",
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: "bottom", labels: { color: "#475569", font: { size: 11 }, padding: 12 } }
      }
    }
  });
}

function drawElevationChart(acts) {
  const byPerson = {};
  acts.forEach(a => {
    if (!byPerson[a.name]) byPerson[a.name] = 0;
    byPerson[a.name] += a.elevation_gain || 0;
  });
  const sorted = Object.entries(byPerson).filter(e => e[1] > 0).sort((a, b) => b[1] - a[1]);

  if (!sorted.length) {
    $("elevationChart").parentElement.innerHTML = '<div class="section-title" style="margin-bottom:8px">累计爬升排行</div><div class="note">暂无爬升数据</div>';
    return;
  }

  new Chart($("elevationChart").getContext("2d"), {
    type: "bar",
    data: {
      labels: sorted.map(e => e[0]),
      datasets: [{
        label: "爬升 (m)",
        data: sorted.map(e => e[1]),
        backgroundColor: "rgba(139,92,246,0.6)",
        borderRadius: 6, borderWidth: 0,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: "#94a3b8", font: { size: 10 } } },
        y: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } }
      }
    }
  });
}

function renderRankingTable(acts) {
  const byPerson = {};
  acts.forEach(a => {
    if (!byPerson[a.name]) {
      byPerson[a.name] = { name: a.name, dist: 0, time: 0, elev: 0, count: 0, device: a.device || "--" };
    }
    byPerson[a.name].dist += a.distance_km || 0;
    byPerson[a.name].time += a.moving_min || 0;
    byPerson[a.name].elev += a.elevation_gain || 0;
    byPerson[a.name].count += 1;
  });
  const sorted = Object.values(byPerson).sort((a, b) => b.dist - a.dist);

  $("ranking-table").innerHTML = sorted.map((m, i) => `
    <div class="row">
      <div>
        <div class="row-title">#${i + 1} ${m.name}</div>
        <div class="row-meta">${m.count} 次 · ${fmt.format(m.time)} min · 爬升 ${fmt0.format(m.elev)} m · 设备: ${m.device}</div>
      </div>
      <div class="row-score">${fmt.format(m.dist)} km</div>
    </div>
  `).join("");
}

loadClub();
</script>
</body>
</html>
