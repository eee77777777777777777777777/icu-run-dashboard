<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ICU 璺戞鐪嬫澘</title>
  <link rel="stylesheet" href="/css/design.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="/js/chart.umd.min.js" defer></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
</head>
<body>
<main class="app">
  <!-- Navigation -->
  <header class="topbar">
    <a class="brand" href="/" style="text-decoration:none">
      <strong>ICU 璺戞鐪嬫澘</strong>
      <span id="subtitle">鍏綉鐗堬紝鍔ㄦ€佹洿鏂?/span>
    </a>
    <nav class="nav-links">
      <a class="nav-link active" href="/">棣栭〉</a>
      <a class="nav-link" href="/health.html">鍋ュ悍鎶ュ憡</a>
      <a class="nav-link" href="/club.html">淇变箰閮?/a>
      <a class="nav-link" href="/training_plan.html">AI 璁粌</a>
    </nav>
  </header>

  <div class="status-bar">
    <span class="pulse"></span>
    <span id="status">姝ｅ湪鍔犺浇鏈€鏂版暟鎹?/span>
  </div>
  <div class="error" id="error"></div>
  <div class="loading" id="loading">姝ｅ湪杩炴帴鏁版嵁婧?..</div>

  <!-- Main Tabs -->
  <nav class="tabs" id="main-tabs">
    <button class="tab active" data-view="overview">鎬昏</button>
    <button class="tab" data-view="health">鍋ュ悍蹇収</button>
    <button class="tab" data-view="training">璁粌璇︽儏</button>
  </nav>

  <!-- ========== OVERVIEW TAB ========== -->
  <section class="view active" id="overview" hidden>

    <!-- Race Card + Motivation -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px" id="top-row">
      <div class="race-card" id="race-card-container">
        <div class="race-name" id="race-name">璧涗簨鍔犺浇涓?..</div>
        <div class="race-days" id="race-days">--</div>
        <div class="race-info" id="race-info"></div>
      </div>
      <div>
        <div class="motivation" id="motivation">姣忎竴姝ラ兘绠楁暟銆?/div>
        <div class="status-card" id="recovery-card" style="margin-top:8px">
          <div class="card-label">鎭㈠鎸囨暟</div>
          <div style="display:flex;align-items:baseline;gap:8px;margin-top:6px">
            <span id="recovery-pct" style="font-size:24px;font-weight:750">--</span>
            <span style="font-size:12px;color:var(--text-muted)">/100</span>
          </div>
          <div class="recovery-bar"><div class="recovery-fill" id="recovery-fill" style="width:0%;background:var(--green)"></div></div>
        </div>
      </div>
    </div>

    <!-- Status Cards -->
    <div class="status-grid" id="status-cards"></div>

    <!-- Training Today -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">浠婃棩璁粌寤鸿</div>
        <div class="section-note" id="training-date"></div>
      </div>
      <div class="insight-card" id="training-today">鍔犺浇涓?..</div>
    </div>

    <!-- Insight -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">褰撳墠鍒ゆ柇</div>
        <div class="section-note">鑷姩鍒嗘瀽</div>
      </div>
      <div class="note" id="insight">--</div>
    </div>

    <!-- Training This Week -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">鏈懆璁粌</div>
        <div class="section-note">婵€鍔辫 路 杩愬姩鍗＄墖</div>
      </div>
      <div class="status-grid" id="weekly-cards"></div>
      <div style="margin-top:12px">
        <div class="list" id="week-activities"></div>
      </div>
    </div>
  </section>

  <!-- ========== HEALTH TAB ========== -->
  <section class="view" id="health" hidden>
    <div class="chart-grid" id="health-charts"></div>
  </section>

  <!-- ========== TRAINING TAB ========== -->
  <section class="view" id="training" hidden>
    <div class="section" style="margin-top:0">
      <div class="section-head">
        <div class="section-title">鏈堝害璁粌姹囨€?/div>
        <div class="section-note" id="month-count"></div>
      </div>
      <div class="list" style="overflow-x:auto" id="monthly-groups"></div>
    </div>
    <div class="section">
      <div class="section-head">
        <div class="section-title">鏈€杩戣窇姝?/div>
        <div class="section-note">鏈€鏂拌褰?/div>
      </div>
      <div class="list" id="recent-list"></div>
    </div>
    <div class="section">
      <div class="section-head">
        <div class="section-title">鍏抽敭寮鸿</div>
        <div class="section-note">鎸夎缁冭礋鑽锋帓搴?/div>
      </div>
      <div class="list" id="hard-list"></div>
    </div>
  </section>
</main>

<!-- Activity Detail Modal (10 layers) -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">娲诲姩璇︽儏</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ===== STATE =====
const state = {
  data: null,
  currentTab: "overview"
};

const fmt  = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 1 });
const fmt0 = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 });
const $ = (id) => document.getElementById(id);

// Motivations
const motivations = [
  "姣忎竴姝ラ兘绠楁暟銆?, "浠婂ぉ涓嶆兂璺戯紝鎵€浠ユ墠鍘昏窇銆?, "娌℃湁鐧借窇鐨勬锛屾瘡涓€姝ラ兘浣滄暟銆?,
  "璺戞鏁欎細鎴戠殑鏄細鍐嶅潥鎸佷竴涓嬨€?, "鎱㈠氨鏄揩锛屽皯灏辨槸澶氥€?, "浠婂ぉ鐨勬睏姘存槸鏄庡ぉ鐨勫媼绔犮€?,
  "璺戣捣鏉ワ紝椋庝細鎷ユ姳浣犮€?, "涓嶇敤璺戣耽鍒汉锛岃窇璧㈡槰澶╃殑鑷繁銆?,
];

// ===== VIEW SWITCHING =====
function showTab(name) {
  state.currentTab = name;
  document.querySelectorAll("#main-tabs .tab").forEach(t =>
    t.classList.toggle("active", t.dataset.view === name));
  document.querySelectorAll(".view").forEach(v => {
    v.classList.toggle("active", v.id === name);
    v.hidden = v.id !== name || !state.data;
  });
  if (name === "health" && state.data) renderHealthCharts();
  if (name === "training" && state.data) renderTrainingTab();
}
document.querySelectorAll("#main-tabs .tab").forEach(t =>
  t.addEventListener("click", () => showTab(t.dataset.view)));

// ===== MODAL (10 Layers) =====
function openModal(activity) {
  const d = activity;
  $("modal-title").textContent = d.name || "娲诲姩璇︽儏";

  // Layer 1: Header info
  let html = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <div style="font-size:28px">${d.type === "Ride" ? "馃毚" : "馃弮"}</div>
    <div>
      <div style="font-weight:700;font-size:15px">${d.name || "鏈懡鍚?}</div>
      <div style="color:var(--text-muted);font-size:12px">${d.date || ""} 路 ${d.type || "Run"}</div>
    </div>
  </div>`;

  // Layer 2: 6 metrics
  html += `<div class="modal-metrics">
    <div class="modal-metric"><div class="val">${fmt.format(d.distance_km)}</div><div class="lbl">璺濈 km</div></div>
    <div class="modal-metric"><div class="val">${fmt.format(d.moving_min)}</div><div class="lbl">鏃堕暱 min</div></div>
    <div class="modal-metric"><div class="val">${d.avg_hr || "--"}</div><div class="lbl">蹇冪巼 bpm</div></div>
    <div class="modal-metric"><div class="val">${d.avg_pace ? fmt.format(d.avg_pace) : "--"}</div><div class="lbl">閰嶉€?/km</div></div>
    <div class="modal-metric"><div class="val">${fmt0.format(d.load || 0)}</div><div class="lbl">璁粌璐熻嵎</div></div>
    <div class="modal-metric"><div class="val">${d.vo2max ? fmt0.format(d.vo2max) : "--"}</div><div class="lbl">VO2max</div></div>
  </div>`;

  // Layer 3: Route Map (if route data available)
  if (d.route_coords && d.route_coords.length) {
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--accent)">馃搷</span>璺嚎鍦板浘</h4>
      <div class="route-map" id="route-map-container"></div>
    </div>`;
  }

  // Layer 4: HR Zones
  if (d.hr_zones && Object.keys(d.hr_zones).length) {
    const zones = d.hr_zones;
    const total = Object.values(zones).reduce((s, v) => s + v, 0) || 1;
    const zoneLabels = { "Z1": "鎭㈠", "Z2": "鏈夋哀", "Z3": "鑺傚", "Z4": "闃堝€?, "Z5": "鏃犳哀" };
    const zoneColors = { "Z1": "#16a34a", "Z2": "#3b82f6", "Z3": "#ca8a04", "Z4": "#f97316", "Z5": "#ef4444" };
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--red)">鈾?/span>蹇冪巼鍖洪棿</h4>
      <div class="hr-zone-bar">`;
    Object.entries(zones).forEach(([z, v]) => {
      const pct = (v / total * 100).toFixed(1);
      html += `<div class="hr-zone-seg" style="width:${pct}%;background:${zoneColors[z] || '#94a3b8'}">${pct > 8 ? pct + '%' : ''}</div>`;
    });
    html += `</div>
      <div class="hr-zone-legend">`;
    Object.entries(zones).forEach(([z, v]) => {
      html += `<span><i class="swatch" style="background:${zoneColors[z]}"></i>${zoneLabels[z] || z}: ${fmt0.format(v)} min</span>`;
    });
    html += `</div></div>`;
  }

  // Layer 5: Running Dynamics (Run only)
  if (d.type === "Run" && (d.cadence || d.stride_length || d.gct)) {
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--blue)">馃搻</span>璺戞鍔ㄦ€?/h4>
      <div class="dynamics-grid">
        <div class="dynamic-item"><div class="dv">${d.cadence ? fmt0.format(d.cadence * 2) : "--"}</div><div class="dl">姝ラ spm</div></div>
        <div class="dynamic-item"><div class="dv">${d.stride_length ? fmt.format(d.stride_length) : "--"}</div><div class="dl">姝ュ箙 cm</div></div>
        <div class="dynamic-item"><div class="dv">${d.gct ? fmt0.format(d.gct) : "--"}</div><div class="dl">瑙﹀湴 ms</div></div>
        <div class="dynamic-item"><div class="dv">${d.lr_balance != null ? fmt.format(d.lr_balance) : "--"}</div><div class="dl">宸﹀彸骞宠　 %</div></div>
        <div class="dynamic-item"><div class="dv">${d.vertical_osc ? fmt.format(d.vertical_osc) : "--"}</div><div class="dl">鍨傜洿鎸箙 cm</div></div>
        <div class="dynamic-item"><div class="dv">${d.vertical_ratio ? fmt.format(d.vertical_ratio) : "--"}</div><div class="dl">鍨傜洿姣旂巼 %</div></div>
      </div>
    </div>`;
  }

  // Layer 6: VO2max card (Run)
  if (d.type === "Run" && d.vo2max) {
    const vo2Levels = ["鍏ラ棬", "涓€鑸?, "鑹ソ", "浼樼", "绮捐嫳"];
    const vo2Idx = d.vo2max > 55 ? 4 : d.vo2max > 50 ? 3 : d.vo2max > 45 ? 2 : d.vo2max > 40 ? 1 : 0;
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--green)">馃挩</span>VO2max</h4>
      <div style="text-align:center;padding:8px">
        <div style="font-size:36px;font-weight:800;color:var(--green)">${fmt0.format(d.vo2max)}</div>
        <div style="color:var(--text-muted);font-size:12px">ml/kg/min 路 ${vo2Levels[vo2Idx]}姘村钩</div>
      </div>
    </div>`;
  }

  // Layer 7: Training Effect (Runalyze data if available)
  if (d.training_effect_aerobic != null || d.training_effect_anaerobic != null) {
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--purple)">馃搳</span>璁粌鏁堟灉</h4>
      <div class="dynamics-grid">
        <div class="dynamic-item"><div class="dv">${d.training_effect_aerobic != null ? fmt.format(d.training_effect_aerobic) : "--"}</div><div class="dl">鏈夋哀 TE</div></div>
        <div class="dynamic-item"><div class="dv">${d.training_effect_anaerobic != null ? fmt.format(d.training_effect_anaerobic) : "--"}</div><div class="dl">鏃犳哀 TE</div></div>
        <div class="dynamic-item"><div class="dv">${d.recovery_time_hr != null ? fmt.format(d.recovery_time_hr) : "--"}</div><div class="dl">鎭㈠鏃堕棿 h</div></div>
      </div>
    </div>`;
  }

  // Layer 8: Weather
  if (d.weather_temp != null || d.weather_desc) {
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--cyan)">馃尋</span>澶╂皵</h4>
      <div style="display:flex;gap:20px;font-size:13px;color:var(--text-secondary)">
        <span>馃尅 ${d.weather_temp != null ? fmt.format(d.weather_temp) + '掳C' : '--'}</span>
        <span>馃挧 ${d.weather_humidity != null ? fmt0.format(d.weather_humidity) + '%' : '--'}</span>
        <span>馃尙 ${d.weather_wind != null ? fmt.format(d.weather_wind) + ' km/h' : '--'}</span>
        <span>${d.weather_desc || ''}</span>
      </div>
    </div>`;
  }

  // Layer 9: Pace/HR Mini Chart
  html += `<div class="modal-layer">
    <h4><span class="layer-icon" style="background:var(--accent)">馃搱</span>閰嶉€?路 蹇冪巼</h4>
    <div class="modal-chart"><canvas id="modalPaceChart" height="180"></canvas></div>
  </div>`;

  // Layer 10: AI Analysis
  html += `<div class="modal-layer">
    <h4><span class="layer-icon" style="background:var(--purple)">馃</span>AI 鍒嗘瀽</h4>
    <div class="ai-analysis" id="modal-ai">${d.ai_analysis || generateAnalysis(d)}</div>
  </div>`;

  $("modal-body").innerHTML = html;
  $("modal").classList.add("active");

  // Draw route map after DOM ready
  setTimeout(() => {
    if (d.route_coords && d.route_coords.length) {
      drawRouteMap(d.route_coords);
    }
    drawModalPaceChart(d);
  }, 200);
}

function generateAnalysis(d) {
  const parts = [];
  if (d.avg_hr) {
    const hr = d.avg_hr;
    if (hr < 130) parts.push("浣庡績鐜囪交鏉捐窇锛?);
    else if (hr < 145) parts.push("涓瓑寮哄害鏈夋哀璺戯紝");
    else if (hr < 160) parts.push("杈冮珮寮哄害鑺傚璺戯紝");
    else parts.push("楂樺己搴﹁缁冿紝");
  }
  if (d.distance_km) {
    if (d.distance_km < 5) parts.push("鐭窛绂绘仮澶嶆垨閫熷害璁粌銆?);
    else if (d.distance_km < 10) parts.push("涓窛绂诲熀纭€璁粌銆?);
    else if (d.distance_km < 21) parts.push("闀胯窛绂昏€愬姏璁粌銆?);
    else parts.push("瓒呴暱璺濈 LSD 璁粌銆?);
  }
  if (d.load) {
    if (d.load > 120) parts.push(" 璁粌璐熻嵎杈冮珮锛屾敞鎰忔仮澶嶃€?);
    else if (d.load < 30) parts.push(" 杞绘澗璁粌鏃ワ紝鎭㈠鑹ソ銆?);
  }
  return parts.join("") || "鏆傛棤瓒冲鏁版嵁鐢熸垚鍒嗘瀽銆?;
}

function drawRouteMap(coords) {
  const container = $("route-map-container");
  if (!container) return;
  const map = L.map(container, { attributionControl: false, zoomControl: true });
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", { maxZoom: 19 }).addTo(map);
  const latlngs = coords.map(c => [c.lat, c.lng]);
  const polyline = L.polyline(latlngs, { color: "#f97316", weight: 3, opacity: 0.8 }).addTo(map);
  map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
}

function drawModalPaceChart(d) {
  const canvas = $("modalPaceChart");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const labels = d.pace_data ? d.pace_data.map((_, i) => `${i}km`) : ["璧?, "涓?, "鏈?];
  const paceData = d.pace_data || (d.avg_pace ? [d.avg_pace * 0.95, d.avg_pace, d.avg_pace * 1.05] : []);
  const hrData = d.hr_data || (d.avg_hr ? [d.avg_hr - 5, d.avg_hr, d.avg_hr + 5] : []);

  if (!paceData.length && !hrData.length) {
    canvas.parentElement.innerHTML = '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px">鏆傛棤鍒嗘鏁版嵁</div>';
    return;
  }

  new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "閰嶉€?/km",
          data: paceData,
          borderColor: "#f97316",
          backgroundColor: "transparent",
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
          yAxisID: "y",
        },
        {
          label: "蹇冪巼 bpm",
          data: hrData,
          borderColor: "#ef4444",
          backgroundColor: "transparent",
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
          yAxisID: "y1",
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: "#475569", font: { size: 10 }, boxWidth: 12, padding: 8 }
        }
      },
      scales: {
        x: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8", font: { size: 10 } } },
        y: {
          position: "left",
          grid: { color: "#e2e8f0" },
          ticks: { color: "#f97316", font: { size: 10 } },
          reverse: true,
          title: { display: true, text: "min/km", color: "#f97316", font: { size: 10 } }
        },
        y1: {
          position: "right",
          grid: { display: false },
          ticks: { color: "#ef4444", font: { size: 10 } },
          title: { display: true, text: "bpm", color: "#ef4444", font: { size: 10 } }
        }
      }
    }
  });
}

function closeModal() {
  $("modal").classList.remove("active");
}
$("modal").addEventListener("click", (e) => {
  if (e.target === $("modal")) closeModal();
});

// ===== RENDER =====
function render(data) {
  state.data = data;
  $("loading").style.display = "none";
  document.querySelectorAll(".view").forEach(v =>
    v.hidden = v.id !== state.currentTab);

  const s = data.summary || {};
  $("subtitle").textContent = data.cached ? "缂撳瓨鏁版嵁锛屽悗鍙板畾鏃跺埛鏂? : "宸叉媺鍙栨渶鏂版暟鎹?;
  $("status").textContent = `鏇存柊浜?${new Date(data.generated_at).toLocaleString("zh-CN")}`;
  $("motivation").textContent = motivations[Math.floor(Math.random() * motivations.length)];

  renderRaceCard(data.race);
  renderRecovery(s);
  renderStatusCards(s);
  renderInsight(s, data.month_rows);
  renderWeeklyCards(s, data.recent_runs);
  renderWeekActivities(data.recent_runs);
  renderTrainingToday(data.training_today);
}

// ===== RACE CARD =====
function renderRaceCard(race) {
  if (race && race.name) {
    $("race-name").textContent = race.name;
    $("race-days").textContent = race.days_left != null ? `${race.days_left} 澶ー : "--";
    $("race-info").textContent = `${race.date || ""} 路 ${race.distance || ""} 路 ${race.location || ""}`;
  } else {
    $("race-name").textContent = "涓嬩竴鍦烘瘮璧?;
    $("race-days").textContent = "寰呭畾";
    $("race-info").textContent = "閰嶇疆姣旇禌淇℃伅鍚庡彲鏄剧ず鍊掕鏃?;
  }
}

// ===== RECOVERY =====
function renderRecovery(s) {
  const tsb = s.tsb != null ? s.tsb : 0;
  // Map TSB to recovery index: -30..10 -> 0..100
  const recovery = Math.min(100, Math.max(0, Math.round((tsb + 30) / 40 * 100)));
  $("recovery-pct").textContent = recovery;
  const fill = $("recovery-fill");
  fill.style.width = recovery + "%";
  fill.style.background = recovery > 70 ? "var(--green)" : recovery > 40 ? "var(--yellow)" : "var(--red)";
}

    { label: "璺戞娆℃暟", value: fmt0.format(s.activity_count), sub: "涓夊勾绱", accent: "card-accent-blue" },

// ===== INSIGHT =====
function renderInsight(s, monthRows) {
  if (!monthRows || !monthRows.length) {
    $("insight").textContent = "杩樻病鏈夎冻澶熺殑璺戞鏁版嵁鐢熸垚鍒ゆ柇銆?;
    return;
  }
  const peak = [...monthRows].sort((a, b) => b.load - a.load)[0];
  $("insight").textContent =
    `杩囧幓涓夊勾绱 ${fmt.format(s.distance_km)} km锛屽叡 ${fmt0.format(s.activity_count)} 娆¤窇姝ワ紝` +
    `骞冲潎姣忓懆 ${fmt.format(s.weekly_km)} km銆傚嘲鍊兼湀浠?${peak.period}锛宍 +
    `鍗曟湀 ${fmt.format(peak.dist)} km锛岃缁冭礋鑽?${fmt0.format(peak.load)}銆俙 +

// ===== WEEKLY =====
function renderWeeklyCards(s, runs) {
  if (!runs || !runs.length) {
    $("weekly-cards").innerHTML = '<div class="note">鏈懆鏆傛棤璺戞璁板綍</div>';
    return;
  }
  const now = new Date();
  const weekAgo = new Date(now - 7 * 86400000);
  const weekRuns = runs.filter(r => new Date(r.date) >= weekAgo);
  const weekDist = weekRuns.reduce((sum, r) => sum + (r.distance_km || 0), 0);
  const weekTime = weekRuns.reduce((sum, r) => sum + (r.moving_min || 0), 0);
  const weekLoad = weekRuns.reduce((sum, r) => sum + (r.load || 0), 0);

  const cards = [
    { label: "鏈懆璺戦噺", value: `${fmt.format(weekDist)} km`, sub: `${weekRuns.length} 娆 },
    { label: "鏈懆鏃堕暱", value: `${fmt0.format(weekTime)} min`, sub: `${fmt.format(weekTime / 60)} h` },
    { label: "鏈懆璐熻嵎", value: fmt0.format(weekLoad), sub: "TL" },
    { label: "鍛ㄥ潎閫熷害", value: weekTime > 0 ? fmt.format(weekDist / (weekTime / 60)) : "--", sub: "km/h" },
  ];
  $("weekly-cards").innerHTML = cards.map(c => `
    <div class="status-card">
      <div class="card-label">${c.label}</div>
      <div class="card-value" style="font-size:22px">${c.value}</div>
      <div class="card-sub">${c.sub}</div>
    </div>
  `).join("");
}

function renderWeekActivities(runs) {
  if (!runs || !runs.length) {
    $("week-activities").innerHTML = '<div style="padding:16px;color:var(--text-muted)">鏆傛棤鏈€杩戞椿鍔?/div>';
    return;
  }
  const now = new Date();
  const weekRuns = runs.filter(r => new Date(r.date) >= new Date(now - 7 * 86400000)).slice(0, 10);

}

      <div class="section-title" style="margin-bottom:8px">鏈堝害璺戦噺 & 璁粌璐熻嵎</div>
      <canvas id="monthlyDistChart" height="260"></canvas>
      <div class="legend">
        <span><i class="swatch" style="background:var(--accent)"></i>璺戦噺 (km)</span>
        <span><i class="swatch" style="background:var(--purple)"></i>璁粌璐熻嵎</span>
      </div>
    </div>`;
  }
  if (data.hr_bins) {
    html += `<div class="chart-panel">
      <div class="section-title" style="margin-bottom:8px">蹇冪巼鍖洪棿鍒嗗竷</div>
      <canvas id="hrBinsChart" height="220"></canvas>

  }
  if (data.year_rows && data.year_rows.length) {
    html += `<div class="chart-panel">

    </div>`;
  }

function drawMonthlyDistChart(rows) {
  const canvas = $("monthlyDistChart");
  if (!canvas) return;
  const recent = rows.slice(-24);
  new Chart(canvas.getContext("2d"), {
    type: "bar",
    data: {
      labels: recent.map(r => r.period.slice(2).replace("-", ".")),
      datasets: [
        { label: "璺戦噺", data: recent.map(r => r.dist), backgroundColor: "rgba(249,115,22,0.5)", borderColor: "#f97316", borderWidth: 1, borderRadius: 4, yAxisID: "y" },
        { label: "璐熻嵎", data: recent.map(r => r.load), type: "line", borderColor: "#8b5cf6", borderWidth: 2, pointRadius: 2, tension: 0.3, yAxisID: "y1" }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8", font: { size: 10 } } },
        y: { position: "left", grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } },
        y1: { position: "right", grid: { display: false }, ticks: { color: "#8b5cf6" } }
      }
    }
  });
}

function drawHRBinsChart(bins) {
  const canvas = $("hrBinsChart");
  if (!canvas) return;
  const labels = Object.keys(bins);
  const values = Object.values(bins);
  const colors = { "<130": "#16a34a", "130-145": "#0891b2", "145-155": "#ca8a04", "155+": "#ef4444" };
  new Chart(canvas.getContext("2d"), {
    type: "bar",
    data: { labels, datasets: [{ data: values, backgroundColor: labels.map(l => colors[l] || "#94a3b8"), borderRadius: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: "#475569" } },
        y: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } }
      }
    }
  });
}

function drawYearChart(rows) {
  const canvas = $("yearChart");
  if (!canvas) return;
  new Chart(canvas.getContext("2d"), {
    type: "bar",
    data: {
      labels: rows.map(r => r.period),
      datasets: [
        { label: "璺戦噺 km", data: rows.map(r => r.dist), backgroundColor: "rgba(249,115,22,0.5)", borderColor: "#f97316", borderWidth: 1, borderRadius: 6, yAxisID: "y" },
        { label: "璁粌璐熻嵎", data: rows.map(r => r.load), type: "line", borderColor: "#8b5cf6", borderWidth: 2.5, pointRadius: 3, tension: 0.2, yAxisID: "y1" }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: "#475569", font: { size: 11 } } } },
      scales: {
        x: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } },
        y: { position: "left", grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } },
        y1: { position: "right", grid: { display: false }, ticks: { color: "#8b5cf6" } }
      }
    }
  });
}

// ===== DATA LOADING =====
async function loadData(force = false) {
  $("error").style.display = "none";
  $("status").textContent = force ? "姝ｅ湪鎵嬪姩鍒锋柊..." : "姝ｅ湪鏇存柊鏁版嵁...";
  try {
    const resp = await fetch(`/api/data${force ? "?refresh=1" : ""}`, { cache: "no-store" });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${text.slice(0, 200)}`);
    }
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    render(data);
    renderTrainingTab();
  } catch (err) {
    $("loading").style.display = state.data ? "none" : "grid";
    $("status").textContent = "鏇存柊澶辫触";
    $("error").textContent = err.message;
    $("error").style.display = "block";
  }
}

async function loadTrainingToday() {
  try {
    const resp = await fetch("/training_today.html?_=" + Date.now(), { cache: "no-store" });
    if (resp.ok) {
      const html = await resp.text();
      $("training-today").innerHTML = html;
      $("training-date").textContent = "";
    }
  } catch (_) { /* ignore */ }
}

loadData();
loadTrainingToday();
setInterval(() => loadData(false), 5 * 60 * 1000);
</script>
