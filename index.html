<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ICU 跑步看板</title>
  <link rel="stylesheet" href="/css/design.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="/js/chart.umd.min.js" defer></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
</head>
<body>
<main class="app">
  <!-- Navigation -->
  <header class="topbar">
    <a class="brand" href="/" style="text-decoration:none">
      <strong>ICU 跑步看板</strong>
      <span id="subtitle" data-i18n="status.live">公网版，动态更新</span>
    </a>
    <nav class="nav-links">
      <a class="nav-link active" href="/" data-i18n="nav.home">首页</a>
      <a class="nav-link" href="/health.html" data-i18n="nav.health">健康报告</a>
      <a class="nav-link" href="/training_plan.html" data-i18n="nav.training">AI 训练</a>
    </nav>
    <button id="lang-toggle" class="lang-toggle" onclick="toggleLang()" title="Switch language">EN</button>
  </header>

  <div class="status-bar">
    <span class="pulse"></span>
    <span id="status" data-i18n="status.loading">正在加载最新数据</span>
  </div>
  <div class="error" id="error"></div>
  <div class="loading" id="loading">正在连接数据源...</div>

  <!-- Main Tabs -->
  <nav class="tabs" id="main-tabs">
    <button class="tab active" data-view="overview" data-i18n="tab.overview">总览</button>
    <button class="tab" data-view="health" data-i18n="tab.health_snapshot">健康快照</button>
    <button class="tab" data-view="training" data-i18n="tab.training_detail">训练详情</button>
  </nav>

  <!-- ========== OVERVIEW TAB ========== -->
  <section class="view active" id="overview" hidden>

    <!-- Race Card + Motivation -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px" id="top-row">
      <div class="race-card" id="race-card-container">
        <div class="race-name" id="race-name">赛事加载中...</div>
        <div class="race-days" id="race-days">--</div>
        <div class="race-info" id="race-info"></div>
      </div>
      <div>
        <div class="motivation" id="motivation">每一步都算数。</div>
        <div class="status-card" id="recovery-card" style="margin-top:8px">
          <div class="card-label" data-i18n="recovery.index">恢复指数</div>
          <div style="display:flex;align-items:baseline;gap:8px;margin-top:6px">
            <span id="recovery-pct" style="font-size:24px;font-weight:750">--</span>
            <span style="font-size:12px;color:var(--text-muted)">/100</span>
          </div>
          <div class="recovery-bar"><div class="recovery-fill" id="recovery-fill" style="width:0%;background:var(--green)"></div></div>
        </div>
      </div>
    </div>

    <!-- Status Cards -->
    <div class="status-grid" id="status-cards"></div>

    <!-- Training Today -->
    <div class="section">
      <div class="section-head">
        <div class="section-title" data-i18n="training.today">今日训练建议</div>
        <div class="section-note" id="training-date"></div>
      </div>
      <div class="insight-card" id="training-today">加载中...</div>
    </div>

    <!-- Insight -->
    <div class="section">
      <div class="section-head">
        <div class="section-title" data-i18n="insight.title">当前判断</div>
        <div class="section-note" data-i18n="insight.auto">自动分析</div>
      </div>
      <div class="note" id="insight">--</div>
    </div>

    <!-- Training This Week -->
    <div class="section">
      <div class="section-head">
        <div class="section-title" data-i18n="week.title">本周训练</div>
        <div class="section-note" data-i18n="week.motto">激励语 · 运动卡片</div>
      </div>
      <div class="status-grid" id="weekly-cards"></div>
      <div style="margin-top:12px">
        <div class="list" id="week-activities"></div>
      </div>
    </div>
  </section>

  <!-- ========== HEALTH TAB ========== -->
  <section class="view" id="health" hidden>
    <div class="chart-grid" id="health-charts"></div>
  </section>

  <!-- ========== TRAINING TAB ========== -->
  <section class="view" id="training" hidden>
    <div class="section" style="margin-top:0">
      <div class="section-head">
        <div class="section-title" data-i18n="training.monthly">月度训练汇总</div>
        <div class="section-note" id="month-count"></div>
      </div>
      <div class="list" style="overflow-x:auto" id="monthly-groups"></div>
    </div>
    <div class="section">
      <div class="section-head">
        <div class="section-title" data-i18n="training.recent">最近跑步</div>
        <div class="section-note" data-i18n="training.recent_note">最新记录</div>
      </div>
      <div class="list" id="recent-list"></div>
    </div>
    <div class="section">
      <div class="section-head">
        <div class="section-title" data-i18n="training.hard">关键强课</div>
        <div class="section-note" data-i18n="training.hard_note">按训练负荷排序</div>
      </div>
      <div class="list" id="hard-list"></div>
    </div>
  </section>
</main>

<!-- Activity Detail Modal (10 layers) -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title" data-i18n="modal.title">活动详情</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ===== STATE =====
const state = {
  data: null,
  currentTab: "overview"
};

const fmt  = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 1 });
const fmt0 = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 });
const $ = (id) => document.getElementById(id);

// Motivations
const motivations = [
  "每一步都算数。", "今天不想跑，所以才去跑。", "没有白跑的步，每一步都作数。",
  "跑步教会我的是：再坚持一下。", "慢就是快，少就是多。", "今天的汗水是明天的勋章。",
  "跑起来，风会拥抱你。", "不用跑赢别人，跑赢昨天的自己。",
];

// ===== VIEW SWITCHING =====
function showTab(name) {
  state.currentTab = name;
  document.querySelectorAll("#main-tabs .tab").forEach(t =>
    t.classList.toggle("active", t.dataset.view === name));
  document.querySelectorAll(".view").forEach(v => {
    v.classList.toggle("active", v.id === name);
    v.hidden = v.id !== name || !state.data;
  });
  if (name === "health" && state.data) renderHealthCharts();
  if (name === "training" && state.data) renderTrainingTab();
}
document.querySelectorAll("#main-tabs .tab").forEach(t =>
  t.addEventListener("click", () => showTab(t.dataset.view)));

// ===== MODAL (10 Layers) =====
function openModal(activity) {
  const d = activity;
  $("modal-title").textContent = d.name || "活动详情";

  // Layer 1: Header info
  let html = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <div style="font-size:28px">${d.type === "Ride" ? "🚴" : "🏃"}</div>
    <div>
      <div style="font-weight:700;font-size:15px">${d.name || "未命名"}</div>
      <div style="color:var(--text-muted);font-size:12px">${d.date || ""} · ${d.type || "Run"}</div>
    </div>
  </div>`;

  // Layer 2: 6 metrics
  html += `<div class="modal-metrics">
    <div class="modal-metric"><div class="val">${fmt.format(d.distance_km)}</div><div class="lbl">距离 km</div></div>
    <div class="modal-metric"><div class="val">${fmt.format(d.moving_min)}</div><div class="lbl">时长 min</div></div>
    <div class="modal-metric"><div class="val">${d.avg_hr || "--"}</div><div class="lbl">心率 bpm</div></div>
    <div class="modal-metric"><div class="val">${d.avg_pace ? fmt.format(d.avg_pace) : "--"}</div><div class="lbl">配速 /km</div></div>
    <div class="modal-metric"><div class="val">${fmt0.format(d.load || 0)}</div><div class="lbl">训练负荷</div></div>
    <div class="modal-metric"><div class="val">${d.vo2max ? fmt0.format(d.vo2max) : "--"}</div><div class="lbl">VO2max</div></div>
  </div>`;

  // Layer 3: Route Map (if route data available)
  if (d.route_coords && d.route_coords.length) {
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--accent)">📍</span>路线地图</h4>
      <div class="route-map" id="route-map-container"></div>
    </div>`;
  }

  // Layer 4: HR Zones
  if (d.hr_zones && Object.keys(d.hr_zones).length) {
    const zones = d.hr_zones;
    const total = Object.values(zones).reduce((s, v) => s + v, 0) || 1;
    const zoneLabels = { "Z1": "恢复", "Z2": "有氧", "Z3": "节奏", "Z4": "阈值", "Z5": "无氧" };
    const zoneColors = { "Z1": "#16a34a", "Z2": "#3b82f6", "Z3": "#ca8a04", "Z4": "#f97316", "Z5": "#ef4444" };
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--red)">♥</span>心率区间</h4>
      <div class="hr-zone-bar">`;
    Object.entries(zones).forEach(([z, v]) => {
      const pct = (v / total * 100).toFixed(1);
      html += `<div class="hr-zone-seg" style="width:${pct}%;background:${zoneColors[z] || '#94a3b8'}">${pct > 8 ? pct + '%' : ''}</div>`;
    });
    html += `</div>
      <div class="hr-zone-legend">`;
    Object.entries(zones).forEach(([z, v]) => {
      html += `<span><i class="swatch" style="background:${zoneColors[z]}"></i>${zoneLabels[z] || z}: ${fmt0.format(v)} min</span>`;
    });
    html += `</div></div>`;
  }

  // Layer 5: Running Dynamics (Run only)
  if (d.type === "Run" && (d.cadence || d.stride_length || d.gct)) {
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--blue)">📐</span>跑步动态</h4>
      <div class="dynamics-grid">
        <div class="dynamic-item"><div class="dv">${d.cadence ? fmt0.format(d.cadence * 2) : "--"}</div><div class="dl">步频 spm</div></div>
        <div class="dynamic-item"><div class="dv">${d.stride_length ? fmt.format(d.stride_length) : "--"}</div><div class="dl">步幅 cm</div></div>
        <div class="dynamic-item"><div class="dv">${d.gct ? fmt0.format(d.gct) : "--"}</div><div class="dl">触地 ms</div></div>
        <div class="dynamic-item"><div class="dv">${d.lr_balance != null ? fmt.format(d.lr_balance) : "--"}</div><div class="dl">左右平衡 %</div></div>
        <div class="dynamic-item"><div class="dv">${d.vertical_osc ? fmt.format(d.vertical_osc) : "--"}</div><div class="dl">垂直振幅 cm</div></div>
        <div class="dynamic-item"><div class="dv">${d.vertical_ratio ? fmt.format(d.vertical_ratio) : "--"}</div><div class="dl">垂直比率 %</div></div>
      </div>
    </div>`;
  }

  // Layer 6: VO2max card (Run)
  if (d.type === "Run" && d.vo2max) {
    const vo2Levels = ["入门", "一般", "良好", "优秀", "精英"];
    const vo2Idx = d.vo2max > 55 ? 4 : d.vo2max > 50 ? 3 : d.vo2max > 45 ? 2 : d.vo2max > 40 ? 1 : 0;
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--green)">💨</span>VO2max</h4>
      <div style="text-align:center;padding:8px">
        <div style="font-size:36px;font-weight:800;color:var(--green)">${fmt0.format(d.vo2max)}</div>
        <div style="color:var(--text-muted);font-size:12px">ml/kg/min · ${vo2Levels[vo2Idx]}水平</div>
      </div>
    </div>`;
  }

  // Layer 7: Training Effect (Runalyze data if available)
  if (d.training_effect_aerobic != null || d.training_effect_anaerobic != null) {
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--purple)">📊</span>训练效果</h4>
      <div class="dynamics-grid">
        <div class="dynamic-item"><div class="dv">${d.training_effect_aerobic != null ? fmt.format(d.training_effect_aerobic) : "--"}</div><div class="dl">有氧 TE</div></div>
        <div class="dynamic-item"><div class="dv">${d.training_effect_anaerobic != null ? fmt.format(d.training_effect_anaerobic) : "--"}</div><div class="dl">无氧 TE</div></div>
        <div class="dynamic-item"><div class="dv">${d.recovery_time_hr != null ? fmt.format(d.recovery_time_hr) : "--"}</div><div class="dl">恢复时间 h</div></div>
      </div>
    </div>`;
  }

  // Layer 8: Weather
  if (d.weather_temp != null || d.weather_desc) {
    html += `<div class="modal-layer">
      <h4><span class="layer-icon" style="background:var(--cyan)">🌤</span>天气</h4>
      <div style="display:flex;gap:20px;font-size:13px;color:var(--text-secondary)">
        <span>🌡 ${d.weather_temp != null ? fmt.format(d.weather_temp) + '°C' : '--'}</span>
        <span>💧 ${d.weather_humidity != null ? fmt0.format(d.weather_humidity) + '%' : '--'}</span>
        <span>🌬 ${d.weather_wind != null ? fmt.format(d.weather_wind) + ' km/h' : '--'}</span>
        <span>${d.weather_desc || ''}</span>
      </div>
    </div>`;
  }

  // Layer 9: Pace/HR Mini Chart
  html += `<div class="modal-layer">
    <h4><span class="layer-icon" style="background:var(--accent)">📈</span>配速 · 心率</h4>
    <div class="modal-chart"><canvas id="modalPaceChart" height="180"></canvas></div>
  </div>`;

  // Layer 10: AI Analysis
  html += `<div class="modal-layer">
    <h4><span class="layer-icon" style="background:var(--purple)">🤖</span>AI 分析</h4>
    <div class="ai-analysis" id="modal-ai">${d.ai_analysis || generateAnalysis(d)}</div>
  </div>`;

  $("modal-body").innerHTML = html;
  $("modal").classList.add("active");

  // Draw route map after DOM ready
  setTimeout(() => {
    if (d.route_coords && d.route_coords.length) {
      drawRouteMap(d.route_coords);
    }
    drawModalPaceChart(d);
  }, 200);
}

function generateAnalysis(d) {
  const parts = [];
  if (d.avg_hr) {
    const hr = d.avg_hr;
if (hr < 130) parts.push("低心率轻松跑，");
    else if (hr < 145) parts.push("中等强度有氧跑，");
    else if (hr < 160) parts.push("较高强度节奏跑，");
    else parts.push("高强度训练，");
  }
  if (d.distance_km) {
if (d.distance_km < 5) parts.push("短距离恢复或速度训练。");
else if (d.distance_km < 10) parts.push("中距离基础训练。");
else if (d.distance_km < 21) parts.push("长距离耐力训练。");
else parts.push("超长距离 LSD 训练。");
  }
  if (d.load) {
if (d.load > 120) parts.push(" 训练负荷较高，注意恢复。");
else if (d.load < 30) parts.push(" 轻松训练日，恢复良好。");
  }
return parts.join("") || "暂无足够数据生成分析。";
}

function drawRouteMap(coords) {
  const container = $("route-map-container");
  if (!container) return;
  const map = L.map(container, { attributionControl: false, zoomControl: true });
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", { maxZoom: 19 }).addTo(map);
  const latlngs = coords.map(c => [c.lat, c.lng]);
  const polyline = L.polyline(latlngs, { color: "#f97316", weight: 3, opacity: 0.8 }).addTo(map);
  map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
}

function drawModalPaceChart(d) {
  const canvas = $("modalPaceChart");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
const labels = d.pace_data ? d.pace_data.map((_, i) => `${i}km`) : ["始", "中", "末"];
  const paceData = d.pace_data || (d.avg_pace ? [d.avg_pace * 0.95, d.avg_pace, d.avg_pace * 1.05] : []);
  const hrData = d.hr_data || (d.avg_hr ? [d.avg_hr - 5, d.avg_hr, d.avg_hr + 5] : []);

  if (!paceData.length && !hrData.length) {
    canvas.parentElement.innerHTML = '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px">暂无分段数据</div>';
    return;
  }

  new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "配速 /km",
          data: paceData,
          borderColor: "#f97316",
          backgroundColor: "transparent",
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
          yAxisID: "y",
        },
        {
          label: "心率 bpm",
          data: hrData,
          borderColor: "#ef4444",
          backgroundColor: "transparent",
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
          yAxisID: "y1",
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: "#475569", font: { size: 10 }, boxWidth: 12, padding: 8 }
        }
      },
      scales: {
        x: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8", font: { size: 10 } } },
        y: {
          position: "left",
          grid: { color: "#e2e8f0" },
          ticks: { color: "#f97316", font: { size: 10 } },
          reverse: true,
          title: { display: true, text: "min/km", color: "#f97316", font: { size: 10 } }
        },
        y1: {
          position: "right",
          grid: { display: false },
          ticks: { color: "#ef4444", font: { size: 10 } },
          title: { display: true, text: "bpm", color: "#ef4444", font: { size: 10 } }
        }
      }
    }
  });
}

function closeModal() {
  $("modal").classList.remove("active");
}
$("modal").addEventListener("click", (e) => {
  if (e.target === $("modal")) closeModal();
});

// ===== RENDER =====
function render(data) {
  state.data = data;
  $("loading").style.display = "none";
  document.querySelectorAll(".view").forEach(v =>
    v.hidden = v.id !== state.currentTab);

  const s = data.summary || {};
  $("subtitle").textContent = data.cached ? "缓存数据，后台定时刷新 : "已拉取最新数据;
  $("status").textContent = `更新于${new Date(data.generated_at).toLocaleString("zh-CN")}`;
  $("motivation").textContent = motivations[Math.floor(Math.random() * motivations.length)];

  renderRaceCard(data.race);
  renderRecovery(s);
  renderStatusCards(s);
  renderInsight(s, data.month_rows);
  renderWeeklyCards(s, data.recent_runs);
  renderWeekActivities(data.recent_runs);
  renderTrainingToday(data.training_today);
}

// ===== RACE CARD =====
function renderRaceCard(race) {
  if (race && race.name) {
    $("race-name").textContent = race.name;
    $("race-days").textContent = race.days_left != null ? `${race.days_left} 天` : "--";
    $("race-info").textContent = `${race.date || ""} · ${race.distance || ""} · ${race.location || ""}`;
  } else {
    $("race-name").textContent = "下一场比赛;
    $("race-days").textContent = "待定";
    $("race-info").textContent = "配置比赛信息后可显示倒计时;
  }
}

// ===== RECOVERY =====
function renderRecovery(s) {
  const tsb = s.tsb != null ? s.tsb : 0;
  // Map TSB to recovery index: -30..10 -> 0..100
  const recovery = Math.min(100, Math.max(0, Math.round((tsb + 30) / 40 * 100)));
  $("recovery-pct").textContent = recovery;
  const fill = $("recovery-fill");
  fill.style.width = recovery + "%";
  fill.style.background = recovery > 70 ? "var(--green)" : recovery > 40 ? "var(--yellow)" : "var(--red)";
}

// ===== STATUS CARDS =====
function renderStatusCards(s) {
  const cards = [
    { label: "三年总跑量, value: `${fmt.format(s.distance_km)} km`, sub: `${s.first_run || ""} 开始`, accent: "card-accent-orange" },
    { label: "跑步次数", value: fmt0.format(s.activity_count), sub: "三年累计", accent: "card-accent-blue" },
    { label: "平均每周", value: `${fmt.format(s.weekly_km)} km`, sub: "km / 周, accent: "card-accent-green" },
    { label: "训练负荷", value: fmt0.format(s.training_load), sub: "三年累计 TL", accent: "card-accent-purple" },
    { label: "平均心率", value: s.avg_hr ? `${fmt.format(s.avg_hr)} bpm` : "--", sub: "全部活动均值, accent: "card-accent-red" },
    { label: "平均配速, value: s.avg_pace ? fmt.format(s.avg_pace) : "--", sub: "/km", accent: "card-accent-cyan" },
    { label: "总时长, value: s.total_hours ? `${fmt0.format(s.total_hours)} h` : "--", sub: "三年累计", accent: "card-accent-orange" },
    { label: "最高月", value: s.peak_month_km ? `${fmt.format(s.peak_month_km)} km` : "--", sub: s.peak_month || "", accent: "card-accent-green" },
  ];
  $("status-cards").innerHTML = cards.map(c => `
    <div class="status-card ${c.accent}">
      <div class="card-label">${c.label}</div>
      <div class="card-value">${c.value}</div>
      <div class="card-sub">${c.sub}</div>
    </div>
  `).join("");
}

// ===== INSIGHT =====
function renderInsight(s, monthRows) {
  if (!monthRows || !monthRows.length) {
    $("insight").textContent = "还没有足够的跑步数据生成判断。;
    return;
  }
  const peak = [...monthRows].sort((a, b) => b.load - a.load)[0];
  $("insight").textContent =
    `过去三年累计 ${fmt.format(s.distance_km)} km，共 ${fmt0.format(s.activity_count)} 次跑步，` +
    `平均每周 ${fmt.format(s.weekly_km)} km。峰值月份${peak.period}，` +
    `单月 ${fmt.format(peak.dist)} km，训练负荷${fmt0.format(peak.load)}。` +
    (s.avg_hr ? ` 平均心率 ${fmt.format(s.avg_hr)} bpm。` : "");
}

// ===== WEEKLY =====
function renderWeeklyCards(s, runs) {
  if (!runs || !runs.length) {
    $("weekly-cards").innerHTML = '<div class="note">本周暂无跑步记录</div>';
    return;
  }
  const now = new Date();
  const weekAgo = new Date(now - 7 * 86400000);
  const weekRuns = runs.filter(r => new Date(r.date) >= weekAgo);
  const weekDist = weekRuns.reduce((sum, r) => sum + (r.distance_km || 0), 0);
  const weekTime = weekRuns.reduce((sum, r) => sum + (r.moving_min || 0), 0);
  const weekLoad = weekRuns.reduce((sum, r) => sum + (r.load || 0), 0);

  const cards = [
    { label: "本周跑量", value: `${fmt.format(weekDist)} km`, sub: `${weekRuns.length} 次` },
    { label: "本周时长", value: `${fmt0.format(weekTime)} min`, sub: `${fmt.format(weekTime / 60)} h` },
    { label: "本周负荷", value: fmt0.format(weekLoad), sub: "TL" },
    { label: "周均速度", value: weekTime > 0 ? fmt.format(weekDist / (weekTime / 60)) : "--", sub: "km/h" },
  ];
  $("weekly-cards").innerHTML = cards.map(c => `
    <div class="status-card">
      <div class="card-label">${c.label}</div>
      <div class="card-value" style="font-size:22px">${c.value}</div>
      <div class="card-sub">${c.sub}</div>
    </div>
  `).join("");
}

function renderWeekActivities(runs) {
  if (!runs || !runs.length) {
    $("week-activities").innerHTML = '<div style="padding:16px;color:var(--text-muted)">暂无最近活动</div>';
    return;
  }
  const now = new Date();
  const weekRuns = runs.filter(r => new Date(r.date) >= new Date(now - 7 * 86400000)).slice(0, 10);
  if (!weekRuns.length) {
    $("week-activities").innerHTML = '<div style="padding:16px;color:var(--text-muted)">本周暂无跑步记录</div>';
    return;
  }
  $("week-activities").innerHTML = weekRuns.map(r => `
    <div class="row" onclick='openModal(${JSON.stringify(r)})'>
      <div>
        <div class="row-title">${r.name || "未命名"}</div>
        <div class="row-meta">${r.date} · ${fmt.format(r.distance_km)} km · ${fmt.format(r.moving_min)} min · ${r.avg_hr || "--"} bpm</div>
      </div>
      <div class="row-score">${r.load ? fmt0.format(r.load) : "--"}</div>
    </div>
  `).join("");
}

function renderTrainingToday(tt) {
  if (tt && tt.content) {
    $("training-today").innerHTML = tt.content;
    $("training-date").textContent = tt.date || "";
  } else {
    $("training-today").innerHTML = "今日训练建议将通过 /training_today.html 异步加载。;
  }
}

// ===== HEALTH CHARTS =====
function renderHealthCharts() {
  const data = state.data;
  if (!data) return;
  let html = "";

  if (data.month_rows && data.month_rows.length) {
    html += `<div class="chart-panel">
      <div class="section-title" style="margin-bottom:8px">月度跑量 & 训练负荷</div>
      <canvas id="monthlyDistChart" height="260"></canvas>
      <div class="legend">
        <span><i class="swatch" style="background:var(--accent)"></i>跑量 (km)</span>
        <span><i class="swatch" style="background:var(--purple)"></i>训练负荷</span>
      </div>
    </div>`;
  }
  if (data.hr_bins) {
    html += `<div class="chart-panel">
      <div class="section-title" style="margin-bottom:8px">心率区间分布</div>
      <canvas id="hrBinsChart" height="220"></canvas>
    </div>`;
  }
  if (data.year_rows && data.year_rows.length) {
    html += `<div class="chart-panel">
      <div class="section-title" style="margin-bottom:8px">年度汇总</div>
      <canvas id="yearChart" height="220"></canvas>
    </div>`;
  }
  $("health-charts").innerHTML = html || '<div class="note">暂无健康数据图表</div>';

  if (data.month_rows) drawMonthlyDistChart(data.month_rows);
  if (data.hr_bins) drawHRBinsChart(data.hr_bins);
  if (data.year_rows) drawYearChart(data.year_rows);
}

function drawMonthlyDistChart(rows) {
  const canvas = $("monthlyDistChart");
  if (!canvas) return;
  const recent = rows.slice(-24);
  new Chart(canvas.getContext("2d"), {
    type: "bar",
    data: {
      labels: recent.map(r => r.period.slice(2).replace("-", ".")),
      datasets: [
        { label: "跑量", data: recent.map(r => r.dist), backgroundColor: "rgba(249,115,22,0.5)", borderColor: "#f97316", borderWidth: 1, borderRadius: 4, yAxisID: "y" },
        { label: "负荷", data: recent.map(r => r.load), type: "line", borderColor: "#8b5cf6", borderWidth: 2, pointRadius: 2, tension: 0.3, yAxisID: "y1" }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8", font: { size: 10 } } },
        y: { position: "left", grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } },
        y1: { position: "right", grid: { display: false }, ticks: { color: "#8b5cf6" } }
      }
    }
  });
}

function drawHRBinsChart(bins) {
  const canvas = $("hrBinsChart");
  if (!canvas) return;
  const labels = Object.keys(bins);
  const values = Object.values(bins);
  const colors = { "<130": "#16a34a", "130-145": "#0891b2", "145-155": "#ca8a04", "155+": "#ef4444" };
  new Chart(canvas.getContext("2d"), {
    type: "bar",
    data: { labels, datasets: [{ data: values, backgroundColor: labels.map(l => colors[l] || "#94a3b8"), borderRadius: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: "#475569" } },
        y: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } }
      }
    }
  });
}

function drawYearChart(rows) {
  const canvas = $("yearChart");
  if (!canvas) return;
  new Chart(canvas.getContext("2d"), {
    type: "bar",
    data: {
      labels: rows.map(r => r.period),
      datasets: [
        { label: "跑量 km", data: rows.map(r => r.dist), backgroundColor: "rgba(249,115,22,0.5)", borderColor: "#f97316", borderWidth: 1, borderRadius: 6, yAxisID: "y" },
        { label: "训练负荷", data: rows.map(r => r.load), type: "line", borderColor: "#8b5cf6", borderWidth: 2.5, pointRadius: 3, tension: 0.2, yAxisID: "y1" }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: "#475569", font: { size: 11 } } } },
      scales: {
        x: { grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } },
        y: { position: "left", grid: { color: "#e2e8f0" }, ticks: { color: "#94a3b8" } },
        y1: { position: "right", grid: { display: false }, ticks: { color: "#8b5cf6" } }
      }
    }
  });
}

// ===== TRAINING TAB (16-col collapsible monthly) =====
function renderTrainingTab() {
  const data = state.data;
  if (!data) return;

  if (data.month_rows && data.month_rows.length) {
    $("month-count").textContent = `${data.month_rows.length} 个月`;
    const reversed = [...data.month_rows].reverse();
    $("monthly-groups").innerHTML = reversed.map((r, i) => `
      <div class="month-group ${i === 0 ? 'open' : ''}">
        <div class="month-group-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="mgh-label">${r.period}</span>
          <span class="mgh-value">${fmt.format(r.dist)} km · 负荷 ${fmt0.format(r.load || 0)}</span>
        </div>
        <div class="month-group-body">
          <table class="month-detail-table">
            <thead><tr>
              <th>活动</th><th>距离 km</th><th>时长 min</th><th>负荷</th><th>均心</th>
              <th>均速</th><th>爬升 m</th><th>卡路里</th><th>均步频</th><th>均功率</th>
              <th>IF</th><th>TSS</th><th>CTL</th><th>ATL</th><th>TSB</th><th>备注</th>
            </tr></thead>
            <tbody>
              ${r.activities && r.activities.length ? r.activities.map(a => `
                <tr>
                  <td class="clickable" onclick="event.stopPropagation();openModal(${JSON.stringify(a)})">${a.name || "--"}</td>
                  <td>${fmt.format(a.distance_km)}</td>
                  <td>${fmt.format(a.moving_min)}</td>
                  <td>${fmt0.format(a.load || 0)}</td>
                  <td>${a.avg_hr ? fmt0.format(a.avg_hr) : "--"}</td>
                  <td>${a.avg_pace ? fmt.format(a.avg_pace) : "--"}</td>
                  <td>${a.elevation_gain ? fmt0.format(a.elevation_gain) : "--"}</td>
                  <td>${a.calories ? fmt0.format(a.calories) : "--"}</td>
                  <td>${a.cadence ? fmt0.format(a.cadence) : "--"}</td>
                  <td>${a.avg_power ? fmt0.format(a.avg_power) : "--"}</td>
                  <td>${a.ifactor ? fmt.format(a.ifactor) : "--"}</td>
                  <td>${a.tss ? fmt0.format(a.tss) : "--"}</td>
                  <td>${a.ctl != null ? fmt0.format(a.ctl) : "--"}</td>
                  <td>${a.atl != null ? fmt0.format(a.atl) : "--"}</td>
                  <td>${a.tsb != null ? fmt0.format(a.tsb) : "--"}</td>
                  <td style="font-size:10px;color:var(--text-muted)">${a.notes || a.type || ""}</td>
                </tr>
              `).join("") : `<tr><td colspan="16" style="text-align:center;color:var(--text-muted);padding:12px">${r.runs || 0} 次跑步，详情待加载</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    `).join("");
  }

  if (data.recent_runs) {
    $("recent-list").innerHTML = data.recent_runs.slice(0, 15).map(r => `
      <div class="row" onclick='openModal(${JSON.stringify(r)})'>
        <div>
          <div class="row-title">${r.name || "未命名"}</div>
          <div class="row-meta">${r.date} · ${fmt.format(r.distance_km)} km · ${fmt.format(r.moving_min)} min · ${r.avg_hr || "--"} bpm</div>
        </div>
        <div class="row-score">负荷 ${r.load ? fmt0.format(r.load) : "--"}</div>
      </div>
    `).join("");
  }

  if (data.top_by_load) {
    $("hard-list").innerHTML = data.top_by_load.slice(0, 10).map(r => `
      <div class="row" onclick='openModal(${JSON.stringify(r)})'>
        <div>
          <div class="row-title">${r.name || "未命名"}</div>
          <div class="row-meta">${r.date} · ${fmt.format(r.distance_km)} km · ${fmt.format(r.moving_min)} min</div>
        </div>
        <div class="row-score">TL ${r.load ? fmt0.format(r.load) : "--"}</div>
      </div>
    `).join("");
  }
}

// ===== DATA LOADING =====
async function loadData(force = false) {
  $("error").style.display = "none";
  $("status").textContent = force ? "正在手动刷新..." : "正在更新数据...";
  try {
    const resp = await fetch(`/api/data${force ? "?refresh=1" : ""}`, { cache: "no-store" });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${text.slice(0, 200)}`);
    }
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    render(data);
    renderTrainingTab();
  } catch (err) {
    $("loading").style.display = state.data ? "none" : "grid";
    $("status").textContent = "更新失败";
    $("error").textContent = err.message;
    $("error").style.display = "block";
  }
}

async function loadTrainingToday() {
  try {
    const resp = await fetch("/training_today.html?_=" + Date.now(), { cache: "no-store" });
    if (resp.ok) {
      const html = await resp.text();
      $("training-today").innerHTML = html;
      $("training-date").textContent = "";
    }
  } catch (_) { /* ignore */ }
}

loadData();
loadTrainingToday();
setInterval(() => loadData(false), 5 * 60 * 1000);
</script>
